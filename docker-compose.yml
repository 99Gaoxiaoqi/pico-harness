# pico-harness 容器编排
# 用法:
#   cp .env.example .env  并填入 LLM_API_KEY 等
#   docker compose run --rm pico "你的任务"        # CLI 模式(默认)
#   docker compose up                                 # 用下方 command 启动 serve 模式
#
# 切换入口模式:取消注释对应的 command,或用 docker compose run 覆盖:
#   docker compose run --rm pico --serve --port 3000          # REST + WebSocket 模式
#   docker compose run --rm pico --feishu --plan --trace      # 飞书长连接模式
#   docker compose run --rm pico --acp --mode default         # ACP stdio 模式(供 IDE 驱动)

services:
  pico:
    build: .
    image: pico-harness:latest
    container_name: pico

    # 默认 CLI 模式:跑完即退(--rm 配合)。常驻服务请覆盖 command。
    # 要常驻 REST 服务,把下面 command 注释取消(覆盖 Dockerfile 的 ENTRYPOINT args):
    # command: ["--serve", "--port", "3000"]
    stdin_open: true
    tty: true

    # 运行时注入敏感配置(.env 已被 gitignore,绝不进镜像)
    env_file:
      - .env

    # 工作区持久化:Agent 写的文件、.claw/(traces/sessions/permissions)都在宿主机
    volumes:
      - ./workspace:/workspace

    working_dir: /workspace

    # REST 模式(--serve)监听 3000;CLI/feishu/acp 模式不占端口,映射了也无害
    ports:
      - "3000:3000"

    # 容器内调用宿主机 LLM/搜索端点时可能用到(host.docker.internal)
    # Linux 原生 Docker 需加 extra_hosts;Docker Desktop 自动可用
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # 资源/重启策略(常驻服务场景)
    restart: "no"
