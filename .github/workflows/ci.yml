name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Deterministic E2E (no credentials, no external network)
        run: npm run test:e2e

      - name: Build distributable
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Smoke test built TUI in a PTY against local fake OpenAI
        run: npm run smoke:tui
