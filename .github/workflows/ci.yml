name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install filesystem metadata tools
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y acl attr libcap2-bin python3-venv

      - name: Install dependencies
        run: npm ci

      - name: Audit full dependency tree
        run: npm audit --audit-level=low

      - name: Verify native SQLite capabilities
        run: npm run check:storage

      - name: Typecheck runtime packages
        run: npm run typecheck

      - name: Typecheck desktop packages
        run: npm run desktop:typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format

      - name: Run deterministic integration suite
        run: npm run test:integration

      - name: Verify root-only Linux publication ordering in container
        run: |
          git archive HEAD | docker run --rm -i node:22-bookworm bash -lc '
            set -euo pipefail
            mkdir /workspace
            tar -x -C /workspace
            cd /workspace
            apt-get update
            apt-get install --no-install-recommends -y acl libcap2-bin
            npm ci
            npm run build:protocol
            if command -v getfattr >/dev/null; then
              echo "getfattr must be absent during the new-file compatibility check" >&2
              exit 1
            fi
            node --import tsx --import ./src/tui/preload-env.ts \
              --test --test-concurrency=1 \
              --test-name-pattern="(Linux new-file staging|Linux missing-file revalidation)" \
              tests/integration/file-write-safety.test.ts
            apt-get install --no-install-recommends -y attr
            node --import tsx --import ./src/tui/preload-env.ts \
              --test --test-concurrency=1 \
              --test-name-pattern="(preserve Linux ACLs|Linux ACL-denied readers)" \
              tests/integration/file-write-safety.test.ts
          '

      - name: Build distributable
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

  node-compatibility:
    name: Node.js ${{ matrix.node }} compatibility
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [24, 26]

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install filesystem metadata tools
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y acl attr libcap2-bin python3-venv

      - name: Install dependencies for this Node ABI
        run: npm ci

      - name: Verify native SQLite capabilities
        run: npm run check:storage

      - name: Typecheck runtime, Desktop, and Mobile packages
        run: |
          npm run typecheck
          npm run desktop:typecheck
          npm run typecheck --workspace @pico/mobile

      - name: Run deterministic integration suite
        run: npm run test:integration

      - name: Build distributable and Mobile bundle
        run: |
          npm run build
          npm exec --workspace @pico/mobile expo export -- \
            --platform android \
            --output-dir /tmp/pico-mobile-node-${{ matrix.node }}

  windows-security:
    name: Windows security integration
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Windows security integration suite
        env:
          PICO_WINDOWS_LOW_PRIVILEGE_TEST: "1"
        run: npm run test:integration:windows

      - name: Cleanup temporary Windows ACL users
        if: always()
        shell: powershell
        run: |
          Get-LocalUser | Where-Object { $_.Name -like 'pico_acl_*' } | ForEach-Object {
            Remove-LocalUser -SID $_.SID -Confirm:$false
          }
