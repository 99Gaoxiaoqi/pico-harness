name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install filesystem metadata tools
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y acl attr libcap2-bin

      - name: Install dependencies
        run: npm ci

      - name: Audit full dependency tree
        run: npm audit --audit-level=low

      - name: Verify native SQLite capabilities
        run: npm run check:storage

      - name: Typecheck runtime packages
        run: npm run typecheck

      - name: Typecheck desktop packages
        run: npm run desktop:typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format

      - name: Run deterministic integration suite
        run: npm run test:integration

      - name: Build distributable
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run
