name: Real LLM E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

concurrency:
  group: real-llm-e2e
  cancel-in-progress: false

jobs:
  real-llm-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RUN_LLM_E2E: "1"
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run fail-closed real model acceptance suite
        run: npm run test:llm-e2e
