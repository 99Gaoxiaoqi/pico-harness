name: Desktop CI

on:
  push:
    branches: [main, codex/desktop-app]
    paths:
      - "apps/desktop/**"
      - "packages/protocol/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/desktop.yml"
  pull_request:
    paths:
      - "apps/desktop/**"
      - "packages/protocol/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/desktop.yml"

permissions:
  contents: read

jobs:
  desktop-check:
    name: ${{ matrix.os }} desktop check
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Audit full dependency tree
        run: npm audit --audit-level=low

      - name: Verify native SQLite capabilities
        run: npm run check:storage

      - name: Typecheck runtime packages
        run: npm run typecheck

      - name: Typecheck desktop packages
        run: npm run desktop:typecheck

      - name: Lint repository and desktop packages
        run: npm run lint

      - name: Run deterministic integration suite
        if: runner.os == 'macOS'
        run: npm run test:integration

      - name: Run Windows security integration suite
        if: runner.os == 'Windows'
        timeout-minutes: 5
        env:
          PICO_WINDOWS_LOW_PRIVILEGE_TEST: "1"
        run: npm run test:integration:windows

      - name: Cleanup temporary Windows ACL users
        if: always() && runner.os == 'Windows'
        shell: powershell
        run: |
          Get-LocalUser | Where-Object { $_.Name -like 'pico_acl_*' } | ForEach-Object {
            Remove-LocalUser -SID $_.SID -Confirm:$false
          }

      - name: Package unsigned desktop smoke build
        run: npm run desktop:package
